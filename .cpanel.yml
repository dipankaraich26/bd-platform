---
deployment:
  tasks:
    - export DEPLOYPATH=/home/erpsolution26/public_html/business.erpsolution26.com
    - echo "=== Deploying BD Platform $(date) ==="
    - /bin/cp -f server.js $DEPLOYPATH/
    - /bin/cp -f app.js $DEPLOYPATH/
    - /bin/cp -f package.json $DEPLOYPATH/
    - /bin/cp -rf prisma $DEPLOYPATH/
    - /bin/cp -rf backend/dist $DEPLOYPATH/backend/
    - /bin/cp -f backend/package.json $DEPLOYPATH/backend/
    - mkdir -p $DEPLOYPATH/backend/uploads
    - mkdir -p $DEPLOYPATH/frontend
    - rm -rf $DEPLOYPATH/frontend/.next
    - /bin/cp -rf frontend/.next $DEPLOYPATH/frontend/
    - /bin/cp -rf frontend/components $DEPLOYPATH/frontend/
    - /bin/cp -rf frontend/lib $DEPLOYPATH/frontend/
    - /bin/cp -rf frontend/app $DEPLOYPATH/frontend/
    - /bin/cp -f frontend/package.json $DEPLOYPATH/frontend/
    - /bin/cp -f frontend/next.config.js $DEPLOYPATH/frontend/
    - /bin/cp -f frontend/tailwind.config.ts $DEPLOYPATH/frontend/
    - /bin/cp -f frontend/tsconfig.json $DEPLOYPATH/frontend/
    - /bin/cp -f frontend/postcss.config.js $DEPLOYPATH/frontend/ 2>/dev/null || true
    - /bin/cp -f frontend/next-env.d.ts $DEPLOYPATH/frontend/ 2>/dev/null || true
    - mkdir -p $DEPLOYPATH/tmp
    - touch $DEPLOYPATH/tmp/restart.txt
    - echo "=== Deploy complete $(date) ==="
